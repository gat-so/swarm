name: Deploy

on:
  push:
    branches: [master, dev]

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}-frontend
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}-backend

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: |
          if [[ "${{ github.ref_name }}" == "dev" ]]; then
            echo "tag=staging" >> "$GITHUB_OUTPUT"
          else
            echo "tag=production" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.tag }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.tag }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ github.ref_name == 'dev' && 'staging' || 'production' }}
    steps:
      - name: Set environment
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "dev" ]]; then
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "compose_file=docker-compose.staging.yml" >> "$GITHUB_OUTPUT"
          else
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "compose_file=docker-compose.production.yml" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4

      - name: Copy compose file to VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: ${{ secrets.VPS_PORT }}
          source: ${{ steps.env.outputs.compose_file }}
          target: ~/swarm

      - name: Deploy to ${{ steps.env.outputs.environment }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            # Log in to GitHub Container Registry
            echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Navigate to deployment directory
            mkdir -p ~/swarm
            cd ~/swarm

            # Pull latest images and restart containers
            docker compose -f ${{ steps.env.outputs.compose_file }} pull
            docker compose -f ${{ steps.env.outputs.compose_file }} up -d --force-recreate

            # Clean up unused images
            docker image prune -f
